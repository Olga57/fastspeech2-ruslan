audio:
  sample_rate: 22050
  n_fft: 1024
  hop_length: 256
  win_length: 1024
  n_mels: 80
  fmin: 0
  fmax: 8000
pitch:
  fmin: 50
  fmax: 1100
  method: "yin"
  log: true
  normalize: "per_speaker"
energy:
  normalize: "per_speaker"
text:
  lowercase: true
  allowed_punct: " .,!?:;-"
transformer:
  encoder_layer: 4
  encoder_head: 2
  encoder_hidden: 256
  decoder_layer: 4
  decoder_head: 2
  decoder_hidden: 256
  fft_conv1d_filter_size: 1024
  fft_conv1d_kernel_size: [9, 1]
  dropout: 0.1
